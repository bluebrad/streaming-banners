<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Gold / Yellow Emerald Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f6d365" />
      <stop offset="100%" stop-color="#fda085" />
    </linearGradient>

    <!-- Emerald Dark BG -->
    <linearGradient id="greenBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#021f1d" />
      <stop offset="100%" stop-color="#050a0a" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glowGold" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <clipPath id="squareClip">
      <rect width="500" height="500" rx="24" />
    </clipPath>
  </defs>

  <g clip-path="url(#squareClip)">
    <!-- Base BG -->
    <rect width="500" height="500" fill="url(#greenBg)" stroke="#fda085" stroke-width="4" />

    <!-- Neon Accents -->
    <circle cx="250" cy="250" r="220" fill="none" stroke="#fda085" stroke-width="1" stroke-dasharray="10 5" opacity="0.15" />
    <path d="M 0 0 L 150 0 L 0 150 Z" fill="url(#goldGrad)" opacity="0.1" />
    <path d="M 500 500 L 350 500 L 500 350 Z" fill="url(#goldGrad)" opacity="0.1" />

    <!-- Trophy / Star Icon -->
    <g transform="translate(250, 140)">
      <circle cx="0" cy="0" r="55" fill="rgba(253, 160, 133, 0.1)" stroke="#fda085" stroke-width="2" filter="url(#glowGold)" />
      <!-- Star Path -->
      <path d="M 0 -28 L 8 -8 L 30 -8 L 12 5 L 18 26 L 0 13 L -18 26 L -12 5 L -30 -8 L -8 -8 Z" fill="url(#goldGrad)" filter="url(#glowGold)" />
    </g>

    <!-- Text Header -->
    <text x="250" y="255" font-family="'Segoe UI', Roboto, sans-serif" font-size="20" font-weight="900" fill="#20e3b2" text-anchor="middle" letter-spacing="4">
      WEEKLY OVERLAY
    </text>

    <!-- Main Giveaway Title -->
    <text x="250" y="315" font-family="'Segoe UI', Roboto, sans-serif" font-size="46" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="1">
      GIVEAWAY!
    </text>

    <!-- Subtitle description -->
    <text x="250" y="370" font-family="'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="600" fill="#93a8a6" text-anchor="middle" letter-spacing="0.5">
      Type <tspan fill="#fda085" font-weight="800">!ticket</tspan> in chat to enter
    </text>

    <!-- Bottom timer tag -->
    <g transform="translate(250, 425)">
      <rect x="-130" y="-18" width="260" height="36" rx="18" fill="url(#goldGrad)" filter="url(#glowGold)" />
      <text x="0" y="5" font-family="'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="900" fill="#021f1d" text-anchor="middle" letter-spacing="1.5">DRAWING IN 15 MINUTES</text>
    </g>
  </g>
</svg>
