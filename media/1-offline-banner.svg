<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c20" />
      <stop offset="50%" stop-color="#15102a" />
      <stop offset="100%" stop-color="#060409" />
    </linearGradient>

    <!-- Neon Glow Blue -->
    <filter id="glowBlue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Neon Glow Purple -->
    <filter id="glowPurple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="25" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Linear Gradient for Text -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="rgba(123, 97, 255, 0.05)" stroke-width="1.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bgGrad)" />
  <rect width="1920" height="1080" fill="url(#grid)" />

  <!-- Animated-like neon design circles -->
  <circle cx="200" cy="200" r="300" fill="none" stroke="#7b61ff" stroke-width="2" opacity="0.15" filter="url(#glowPurple)" />
  <circle cx="1700" cy="800" r="450" fill="none" stroke="#00f2fe" stroke-width="1.5" opacity="0.1" filter="url(#glowBlue)" />

  <!-- Abstract Tech Grid Lines -->
  <line x1="100" y1="150" x2="400" y2="150" stroke="#7b61ff" stroke-width="3" opacity="0.5" filter="url(#glowPurple)" />
  <line x1="100" y1="150" x2="100" y2="350" stroke="#7b61ff" stroke-width="3" opacity="0.5" filter="url(#glowPurple)" />
  
  <line x1="1820" y1="930" x2="1520" y2="930" stroke="#00f2fe" stroke-width="3" opacity="0.5" filter="url(#glowBlue)" />
  <line x1="1820" y1="930" x2="1820" y2="730" stroke="#00f2fe" stroke-width="3" opacity="0.5" filter="url(#glowBlue)" />

  <!-- Main Center Box -->
  <g transform="translate(960, 540)">
    <!-- Outer Glow Border -->
    <rect x="-650" y="-220" width="1300" height="440" rx="24" fill="rgba(13, 10, 25, 0.75)" stroke="#7b61ff" stroke-width="4" filter="url(#glowPurple)" />
    <rect x="-630" y="-200" width="1260" height="400" rx="16" fill="none" stroke="#00f2fe" stroke-width="2" filter="url(#glowBlue)" opacity="0.8" />

    <!-- Corner Decorative Accents -->
    <path d="M -620 -150 L -620 -190 L -580 -190" fill="none" stroke="#00f2fe" stroke-width="5" stroke-linecap="round" />
    <path d="M 620 -150 L 620 -190 L 580 -190" fill="none" stroke="#00f2fe" stroke-width="5" stroke-linecap="round" />
    <path d="M -620 150 L -620 190 L -580 190" fill="none" stroke="#00f2fe" stroke-width="5" stroke-linecap="round" />
    <path d="M 620 150 L 620 190 L 580 190" fill="none" stroke="#00f2fe" stroke-width="5" stroke-linecap="round" />

    <!-- Pulsing Live Dot -->
    <circle cx="-420" cy="-105" r="10" fill="#ff0055" filter="url(#glowPurple)" />
    <text x="-395" y="-97" font-family="'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="900" fill="#ff0055" letter-spacing="4">LIVE BROADCAST</text>

    <!-- Main Title -->
    <text x="0" y="30" font-family="'Segoe UI', Roboto, sans-serif" font-size="80" font-weight="900" fill="url(#textGrad)" text-anchor="middle" letter-spacing="6" filter="url(#glowBlue)">
      STREAM STARTING SOON
    </text>

    <!-- Subtitle -->
    <text x="0" y="110" font-family="'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="500" fill="#8f8ca4" text-anchor="middle" letter-spacing="8">
      GRAB YOUR POPCORN &amp; GET COMFY
    </text>

    <!-- Loading bar animation-like details -->
    <rect x="-250" y="150" width="500" height="6" rx="3" fill="rgba(255, 255, 255, 0.1)" />
    <rect x="-250" y="150" width="380" height="6" rx="3" fill="#00f2fe" filter="url(#glowBlue)" />
  </g>

  <!-- Footer Info -->
  <text x="960" y="1010" font-family="'Segoe UI', Roboto, sans-serif" font-size="18" font-weight="600" fill="#524f6e" text-anchor="middle" letter-spacing="4">
    SYSTEMS STABLE • WEBCAM ONLINE • AUDIO BUFFERS ENGAGED
  </text>
</svg>
