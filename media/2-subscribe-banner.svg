<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="100%" height="100%">
  <defs>
    <!-- Vibrant Red Gradient -->
    <linearGradient id="coralGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff0844" />
      <stop offset="100%" stop-color="#ffb199" />
    </linearGradient>

    <linearGradient id="darkBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#140f1a" />
      <stop offset="100%" stop-color="#0b080f" />
    </linearGradient>

    <!-- Red Glow -->
    <filter id="glowRed" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <clipPath id="rectClip">
      <rect x="0" y="0" width="1200" height="300" rx="16" />
    </clipPath>
  </defs>

  <!-- Border container with clipping -->
  <g clip-path="url(#rectClip)">
    <!-- Base dark background -->
    <rect width="1200" height="300" fill="url(#darkBg)" stroke="#ff0844" stroke-width="4" />

    <!-- Graphic shapes on background -->
    <path d="M 900 -50 L 1300 150 L 1100 400 Z" fill="url(#coralGrad)" opacity="0.15" filter="url(#glowRed)" />
    <circle cx="50" cy="150" r="120" fill="none" stroke="#ff0844" stroke-width="1.5" opacity="0.15" />
    <circle cx="50" cy="150" r="180" fill="none" stroke="#ff0844" stroke-width="1" opacity="0.08" />

    <!-- YouTube/Streaming Subscribe Play Button Icon -->
    <g transform="translate(140, 150)">
      <circle cx="0" cy="0" r="65" fill="url(#coralGrad)" filter="url(#glowRed)" />
      <!-- Play Triangle -->
      <polygon points="-15,-25 25,0 -15,25" fill="#140f1a" />
    </g>

    <!-- Main Text Block -->
    <g transform="translate(240, 0)">
      <text x="0" y="115" font-family="'Segoe UI', Roboto, sans-serif" font-size="52" font-weight="900" fill="#ffffff" letter-spacing="2">
        ENJOYING THE STREAM?
      </text>
      <text x="0" y="180" font-family="'Segoe UI', Roboto, sans-serif" font-size="34" font-weight="800" fill="url(#coralGrad)" letter-spacing="1">
        Subscribe &amp; Turn On Notifications!
      </text>
      <text x="0" y="225" font-family="'Segoe UI', Roboto, sans-serif" font-size="18" font-weight="500" fill="#7d7890" letter-spacing="3">
        SUPPORT THE CHANNEL • JOIN THE COMMUNITY
      </text>
    </g>

    <!-- Ribbon Label -->
    <g transform="translate(1040, 60)">
      <rect x="-100" y="-20" width="200" height="40" rx="20" fill="rgba(255, 8, 68, 0.15)" stroke="#ff0844" stroke-width="1.5" />
      <text x="0" y="6" font-family="'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="900" fill="#ff0844" text-anchor="middle" letter-spacing="2">NEW VIDEO DAILY</text>
    </g>
  </g>
</svg>
